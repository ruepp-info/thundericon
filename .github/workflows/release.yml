name: Build and attach XPI

# When a GitHub Release is published, derive the add-on version from its tag,
# build the .xpi, and attach it to that release. The tag (e.g. v1.2.3 or 1.2.3)
# is the single source of truth for the version — no manual version bumping.

on:
  release:
    types: [published]

permissions:
  contents: write          # only to upload the asset to the release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"        # strip optional leading "v"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' is not semver (use 1.2.3 or v1.2.3)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test
        run: |
          npm ci
          npm test

      - name: Inject version into manifest + package.json
        run: |
          V="${{ steps.ver.outputs.version }}"
          tmp=$(mktemp); jq --arg v "$V" '.version=$v' manifest.json > "$tmp" && mv "$tmp" manifest.json
          tmp=$(mktemp); jq --arg v "$V" '.version=$v' package.json  > "$tmp" && mv "$tmp" package.json

      - name: Package
        run: python3 tools/package.py

      - name: Attach XPI to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" "dist/thundericon-${{ steps.ver.outputs.version }}.xpi" --clobber
