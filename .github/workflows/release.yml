name: Build and attach XPI

# When a GitHub Release is published, derive the add-on version from its tag,
# build the .xpi, and attach it to that release. The tag (e.g. v1.2.3 or 1.2.3)
# is the single source of truth for the version — no manual version bumping.

on:
  release:
    types: [published]

permissions:
  contents: write          # only to upload the asset to the release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        env:
          TAG: ${{ github.event.release.tag_name }}   # reliable on release events
        run: |
          VERSION="${TAG#v}"        # strip optional leading "v"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' is not semver (use 1.2.3 or v1.2.3)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test
        run: |
          npm ci
          npm test

      - name: Inject version into manifest + package.json
        run: |
          V="${{ steps.ver.outputs.version }}"
          tmp=$(mktemp); jq --arg v "$V" '.version=$v' manifest.json > "$tmp" && mv "$tmp" manifest.json
          tmp=$(mktemp); jq --arg v "$V" '.version=$v' package.json  > "$tmp" && mv "$tmp" package.json

      # Experiment add-ons must pin strict_max_version. Derive it from the current
      # Thunderbird release (Mozilla's machine-readable product-details feed) so it
      # tracks the latest version instead of going stale. Falls back to the
      # committed value if the feed is unreachable.
      - name: Set strict_max_version to the latest Thunderbird
        run: |
          LATEST=$(curl -fsSL --max-time 20 \
            https://product-details.mozilla.org/1.0/thunderbird_versions.json \
            | jq -r '.LATEST_THUNDERBIRD_VERSION // empty')
          MAJOR="${LATEST%%.*}"
          if [[ "$MAJOR" =~ ^[0-9]+$ ]]; then
            MAXV="${MAJOR}.*"
            echo "Latest Thunderbird is $LATEST -> strict_max_version = $MAXV"
            tmp=$(mktemp)
            jq --arg m "$MAXV" '.browser_specific_settings.gecko.strict_max_version = $m' \
              manifest.json > "$tmp" && mv "$tmp" manifest.json
          else
            echo "::warning::Could not read latest Thunderbird version (got '$LATEST'); keeping committed strict_max_version"
          fi

      - name: Package
        run: python3 tools/package.py

      - name: Attach XPI to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG" "dist/thundericon-${{ steps.ver.outputs.version }}.xpi" --clobber
