<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thundericon — Gravatar Test</title>
  <link rel="stylesheet" href="../injected/avatars.css" />
  <link rel="stylesheet" href="options.css" />
  <link rel="stylesheet" href="bimi-test.css" />
</head>
<body class="bimi-test">
  <main class="wrap">
    <header class="head">
      <h1>Gravatar Test</h1>
      <p class="sub">
        Check whether an email address has a Gravatar profile photo. This runs the
        real hash&nbsp;+&nbsp;image-fetch path used by the message list (Gravatar
        needs no DMARC check, so there is nothing to skip here).
      </p>
    </header>

    <section class="card">
      <form id="form" class="test-form">
        <input
          type="text"
          id="query"
          placeholder="name@example.com"
          spellcheck="false"
          autocomplete="off"
          autofocus
        />
        <button type="submit" id="run">Check</button>
      </form>

      <div class="result" id="result" hidden>
        <span class="ti-avatar ti-avatar--row ti-avatar--photo" id="logoBadge"></span>
        <div class="result-text">
          <div class="verdict" id="verdict"></div>
          <div class="meta" id="meta"></div>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Log</h2>
      <pre id="log" class="log" aria-live="polite">Enter an email address and press “Check”.</pre>
    </section>
  </main>

  <script src="gravatar-test.js"></script>
</body>
</html>
